name: Push release to deploy branch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    permissions:
      contents: write

    steps:
      - name: git-checkout
        uses: actions/checkout@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install-frontend-dependencies
        run: npm install -g pnpm && pnpm install

      - name: build-frontend
        env:
          VITE_AUTH_BACKEND_URL: ${{ vars.VITE_AUTH_BACKEND_URL }}
        run: |
          echo "VITE_AUTH_BACKEND_URL=$VITE_AUTH_BACKEND_URL"
          pnpm build

      - name: configure-deploy-directory
        run: |
          mkdir deploy

          # Public-facing files go at root (this IS the document root)
          cp -r backend/public/. deploy/

          # Backend internals go into _app/ (not web-accessible via .htaccess)
          mkdir -p deploy/_app
          cp -r backend/src deploy/_app/src

          # Ignore .env and runtime dirs so git pull doesn't conflict with server files
          printf ".env\nsessions/\nstates/\nrate_limits/\n" > deploy/_app/.gitignore

          # Move built frontend assets into client/
          mv dist deploy/client

      - name: push-to-deploy-branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: deploy
          commit_message: "Build: ${{ github.sha }}"
